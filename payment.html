<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>پرداخت | Delaris Cake</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="payment-page">
        <div class="payment-header">
            <h1>💳 پرداخت</h1>
            <p>اتصال به درگاه امن شتاب</p>
        </div>
        <div class="payment-details">
            <div class="payment-row">
                <span>مبلغ قابل پرداخت:</span>
                <span id="paymentAmount" class="price">۰ تومان</span>
            </div>
            <div class="payment-row">
                <span>شماره سفارش:</span>
                <span id="orderNumber">#DEL-0000</span>
            </div>
        </div>
        <div class="payment-actions">
            <button class="btn-enter btn-full" onclick="processPayment()">
                <span class="btn-text">پرداخت نهایی</span>
                <span class="btn-shimmer"></span>
            </button>
            <button class="btn-back" onclick="goToCart()">← بازگشت به سبد خرید</button>
        </div>
        <div class="payment-security">
            <p>🔒 اتصال ایمن با گواهی SSL</p>
            <p>پشتیبانی از تمام کارت‌های عضو شتاب</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
