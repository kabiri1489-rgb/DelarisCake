<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ثبت‌نام | Delaris Cake</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <section class="register-page">
        <div class="register-card glass-card">
            <div class="register-header">
                <h2>ثبت‌نام / ورود</h2>
                <p>به جمع خانواده‌ی دلاریس بپیوندید</p>
            </div>
            <form id="registerForm">
                <div class="input-group">
                    <input type="text" id="fullName" placeholder=" " required />
                    <label>نام و نام خانوادگی</label>
                </div>
                <div class="input-group">
                    <input type="number" id="age" placeholder=" " required />
                    <label>سن</label>
                </div>
                <div class="input-group">
                    <input type="email" id="email" placeholder=" " required />
                    <label>ایمیل</label>
                </div>
                <div class="button-group">
                    <button type="submit" class="btn-enter btn-full gold-btn">ثبت‌نام</button>
                    <button type="button" class="btn-enter btn-full secondary-btn" onclick="goToDashboard()">ورود</button>
                </div>
            </form>
            <div class="register-footer">
                <p>قبلاً ثبت‌نام کردید؟ <a href="#" onclick="goToDashboard()">ورود به حساب</a></p>
            </div>
        </div>
    </section>
    <script src="script.js"></script>
</body>
</html>
