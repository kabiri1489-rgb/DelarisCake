<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ثبت‌نام | Delaris Cake</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <section class="register-page">
        <div class="register-card">
            <h2>ثبت‌نام</h2>
            <p>برای دسترسی به منوی اختصاصی، ثبت‌نام کنید</p>
            <form id="registerForm">
                <div class="input-group">
                    <input type="text" id="fullName" placeholder=" " required />
                    <label>نام و نام خانوادگی</label>
                </div>
                <div class="input-group">
                    <input type="number" id="age" placeholder=" " required />
                    <label>سن</label>
                </div>
                <div class="input-group">
                    <input type="email" id="email" placeholder=" " required />
                    <label>ایمیل</label>
                </div>
                <button type="submit" class="btn-enter btn-full">
                    <span class="btn-text">ورود به سایت</span>
                    <span class="btn-shimmer"></span>
                </button>
            </form>
            <p class="register-footer">قبلاً ثبت‌نام کردید؟ <a href="dashboard.html">ورود</a></p>
        </div>
    </section>
    <script src="script.js"></script>
</body>
</html>
