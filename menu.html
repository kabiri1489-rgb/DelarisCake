<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ثبت‌نام | دلاریس کیک</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="register-page glass">
        <div class="register-card glass-card">
            <div class="register-header">
                <h2>به دلاریس کیک خوش آمدید</h2>
                <p>ثبت‌نام کنید تا تجربه‌ای لوکس داشته باشید</p>
            </div>
            <form id="registerForm">
                <div class="input-group">
                    <input type="text" id="fullName" placeholder=" " required />
                    <label for="fullName">نام و نام خانوادگی</label>
                </div>
                <div class="input-group">
                    <input type="number" id="age" placeholder=" " required />
                    <label for="age">سن</label>
                </div>
                <div class="input-group">
                    <input type="email" id="email" placeholder=" " required />
                    <label for="email">ایمیل</label>
                </div>
                <button type="submit" class="btn-enter btn-full">
                    <span class="btn-text">ورود به سایت</span>
                    <span class="btn-shimmer"></span>
                </button>
            </form>
            <p class="register-footer">قبلاً ثبت‌نام کرده‌اید؟ <a href="dashboard.html">ورود</a></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
