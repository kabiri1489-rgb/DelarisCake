<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Delaris Cake | Luxury Cakes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Vazirmatn:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- ============================================================ -->
    <!-- اسپلش اسکرین                                                -->
    <!-- ============================================================ -->
    <div class="splash" id="splash">
        <div class="splash-content">
            <h1 class="splash-en">Delaris</h1>
            <p class="splash-sub">Luxury Cakes</p>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- هیرو (عکس مربعی زیر دکمه‌ها)                                -->
    <!-- ============================================================ -->
    <section class="hero" id="hero">
        <div class="hero-bg-luxury"></div>
        
        <div class="hero-container">
            <div class="hero-content">
                <span class="hero-badge">Luxury Cakes</span>
                <h1 class="hero-title">Delaris <span class="gold">Cake</span></h1>
                <p class="hero-tagline">لذت شیرین لحظه‌های خاص</p>
                
                <!-- دکمه‌ها در یک خط -->
                <div class="hero-buttons">
                    <a href="#" class="btn-primary" onclick="goToDashboard()">مشاهده منو</a>
                    <a href="#" class="btn-secondary" onclick="goToMenu()">ثبت‌نام / ورود</a>
                </div>
                
                <!-- عکس مربعی با هاله زیر دکمه‌ها -->
                <div class="hero-image-wrapper">
                    <div class="hero-glow-ring-square"></div>
                    <img src="https://i.supaimg.com/d3484bf0-3568-4b4d-83d8-32004cd9b325/7d37175d-444b-4c6d-9140-486c0ce657d0.jpg" alt="Delaris Cake" class="hero-image-square" />
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
