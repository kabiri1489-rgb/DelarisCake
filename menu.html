<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ثبت‌نام | Delaris Cake</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <section class="register-page">
        <div class="register-card glass-card">
            <h2>ثبت‌نام / ورود</h2>
            <p>برای دسترسی به منوی اختصاصی، ثبت‌نام کنید</p>
            <form id="registerForm">
                <div class="input-group">
                    <input type="text" id="fullName" placeholder=" " required />
                    <label>نام و نام خانوادگی</label>
                </div>
                <div class="input-group">
                    <input type="number" id="age" placeholder=" " required />
                    <label>سن</label>
                </div>
                <div class="input-group">
                    <input type="email" id="email" placeholder=" " required />
                    <label>ایمیل</label>
                </div>
                <button type="submit" class="btn-enter btn-full gold-btn">
                    <span class="btn-text">ثبت‌نام</span>
                    <span class="btn-shimmer"></span>
                </button>
            </form>
            <div class="register-footer">
                <p>قبلاً ثبت‌نام کردید؟ <a href="dashboard.html">ورود به حساب</a></p>
            </div>
        </div>
    </section>

    <footer class="footer" style="margin-top:0; padding:20px 0; border-top: 1px solid rgba(255,255,255,0.04);">
        <div class="container">
            <div class="footer-content" style="grid-template-columns:1fr; text-align:center;">
                <div class="footer-brand">
                    <span class="footer-icon">🍰</span>
                    <h2>Delaris <span class="gold">Cake</span></h2>
                    <p>تماس با ما:</p>
                    <p style="margin:4px 0;">📞 ۰۹۱۷۹۱۳۱۰۳۷</p>
                    <p style="margin:4px 0;">📧 delaris0cake@gmail.com</p>
                    <p style="margin:4px 0;">📍 قشم، دولاب</p>
                    <p style="margin:4px 0;">📷 @delaris_cake</p>
                </div>
            </div>
            <div class="footer-divider"></div>
            <div class="footer-bottom">
                <span>&copy; ۱۴۰۵ تمامی حقوق محفوظ است.</span>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
