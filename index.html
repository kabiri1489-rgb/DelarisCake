<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>DELARIS | Luxury Cakes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Vazirmatn:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- ===== اسپلش اسکرین ===== -->
    <div class="splash" id="splash">
        <div class="splash-content">
            <h1 class="splash-en">DELARIS</h1>
            <p class="splash-sub">Luxury Cakes</p>
        </div>
    </div>

    <!-- ===== HERO ===== -->
    <section class="hero" id="hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <span class="hero-badge">Luxury Cakes</span>
            <h1 class="hero-title">Delaris <span class="gold-text">Cake</span></h1>
            <p class="hero-desc">هنرِ شیرینِ لحظه‌های خاص</p>
            <p class="hero-sub-desc">طراحی اختصاصی کیک برای خاص‌ترین لحظه‌های زندگی</p>
            <div class="hero-buttons">
                <a href="#" class="btn-primary" onclick="goToDashboard()">مشاهده منو</a>
                <a href="#" class="btn-secondary" onclick="goToMenu()">ثبت‌نام / ورود</a>
            </div>
        </div>
        <div class="hero-image">
            <div class="hero-glow"></div>
            <img src="https://i.supaimg.com/d3484bf0-3568-4b4d-83d8-32004cd9b325/7d37175d-444b-4c6d-9140-486c0ce657d0.jpg" alt="Delaris Luxury Cake" />
        </div>
        <div class="corner-tl"></div>
        <div class="corner-br"></div>
    </section>

    <script src="script.js"></script>
</body>
</html>
